# dozeeexx miaomiaowu custom template
# Based on aaa.yaml and tailored for miaomiaowu V3 fake-ip template.
# Daily maintenance: edit rules/Custom_Proxy.list in https://github.com/dozeeexx/miaomiaowu-rules
mode: rule
dns:
  enable: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://120.53.53.53/dns-query
  - https://223.5.5.5/dns-query
  direct-nameserver:
  - https://120.53.53.53/dns-query
  - https://223.5.5.5/dns-query
  nameserver-policy:
    geosite:cn,private:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
    geosite:geolocation-!cn:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
  - https://120.53.53.53/dns-query
  - https://223.5.5.5/dns-query
  ipv6: true
  listen: 0.0.0.0:7874
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  fake-ip-filter:
  - +.lan
  - +.local
  - +.example.com
proxies: null
proxy-groups:
- name: 🚀 节点选择
  type: select
  include-all: true
  include-all-proxies: true
  include-all-providers: true
  proxies:
  - ♻️ 自动选择
  - 🌠 中转节点
  - 🌄 落地节点
  - __PROXY_PROVIDERS__
  - __PROXY_NODES__
  - DIRECT
  - REJECT
- name: ♻️ 自动选择
  type: url-test
  include-all: true
  include-all-proxies: true
  include-all-providers: true
  proxies:
  - __PROXY_PROVIDERS__
  - __PROXY_NODES__
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50
- name: 🌠 中转节点
  type: select
  include-all: true
  include-all-proxies: true
  include-all-providers: true
  filter: 中转|relay|RELAY|Relay|entry|ENTRY|Entry
  proxies:
  - __PROXY_PROVIDERS__
  - __PROXY_NODES__
- name: 🌄 落地节点
  type: select
  include-all: true
  include-all-proxies: true
  include-all-providers: true
  filter: 落地|exit|EXIT|Exit|egress|EGRESS|Egress
  proxies:
  - __PROXY_PROVIDERS__
  - __PROXY_NODES__
  dialer-proxy-group: 🌠 中转节点
- name: 💬 AI 服务
  type: select
  include-all: true
  include-all-proxies: true
  include-all-providers: true
  proxies:
  - 🚀 节点选择
  - 🌄 落地节点
  - 🌠 中转节点
  - DIRECT
  - REJECT
  - __PROXY_PROVIDERS__
  - __PROXY_NODES__
- name: 📹 油管视频
